name: Publish npm package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish okx-trader to npm after validation"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Check module syntax
        run: npm run check:mjs

      - name: Run mock story
        run: npm run mock:story

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Check whether package version is already published
        id: package-version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          name="$(node -p "require('./package.json').name")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "$name@$version is already published; skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "$name@$version is not published yet; publishing is allowed."
          fi

      - name: Publish to npm with trusted publishing
        if: ${{ steps.package-version.outputs.should_publish == 'true' && (github.event_name == 'push' || github.event.inputs.publish == 'true') }}
        run: npm publish --access public --provenance
